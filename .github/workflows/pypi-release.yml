name: PyPI Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pypi-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Python artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check release tag format
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must look like v0.1.0"
              exit 1
              ;;
          esac

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check package version matches tag
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          version = pyproject["project"]["version"]
          tag = "${{ inputs.tag }}"
          if tag != f"v{version}":
              raise SystemExit(f"Tag {tag} does not match package version {version}")
          PY

      - name: Build package artifacts
        run: |
          python -m pip install -U pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opentalking-python-dist-${{ inputs.tag }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/opentalking/
    permissions:
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: opentalking-python-dist-${{ inputs.tag }}
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
